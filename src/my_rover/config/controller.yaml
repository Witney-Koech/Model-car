controller_manager:
  ros__parameters:
    update_rate: 50

    diff_cont:
      type: diff_drive_controller/DiffDriveController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster


diff_cont:
  ros__parameters:
    left_wheel_names: [
      "FrontLeftWheel_link_joint",
      "BackLeftWheel_link_joint"
    ]

    right_wheel_names: [
      "FrontRightWheel_link_joint",
      "BackRightWheel_link_joint"
    ]

    wheel_separation: 0.051   
    wheel_radius: 0.03       

    publish_rate: 50
    base_frame_id: base_link

    use_stamped_vel: false
    cmd_vel_timeout: 0.5

    enable_odom_tf: true
